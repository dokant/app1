<script>
let allFaqs = [];
let currentFilter = '전체';

// API 실패 시 표시할 기본 FAQ
const FAQ_STATIC = [
  { question: '어떤 업무를 대행해 드리나요?', answer: '인허가·등록, 조달·입찰, 기업인증, 계약서·내용증명, 행정심판, 출입국·비자 등 6개 분야의 행정 업무를 전문적으로 대행합니다.', category: '업무범위' },
  { question: '상담은 어떻게 받을 수 있나요?', answer: '전화(010-7128-8192) 또는 온라인 신청서를 통해 접수하시면 영업일 기준 24시간 이내에 연락드립니다.', category: '접수문의' },
  { question: '수수료는 어떻게 책정되나요?', answer: '업무 유형과 난이도에 따라 달라집니다. 초기 상담 후 정확한 견적을 안내해 드립니다.', category: '비용' },
  { question: '서류를 준비하지 않아도 신청 가능한가요?', answer: '네, 우선 신청서를 제출해 주시면 담당자가 필요 서류 목록을 안내드립니다.', category: '서류' },
  { question: '처리 기간은 얼마나 걸리나요?', answer: '업무 종류에 따라 다르며, 표준 인허가는 2~4주, 단순 서류 작성은 2~3일 내 처리 가능합니다.', category: '진행' },
  { question: '행정심판 승률은 어느 정도인가요?', answer: '사안에 따라 다르나, 오랜 공직 경험을 바탕으로 행정기관의 처리 방식과 심판 기준을 잘 이해하고 있어 유리한 결과를 위해 최선을 다합니다.', category: '업무범위' },
  { question: '비용은 선불인가요 후불인가요?', answer: '업무 착수 전 일부 착수금을 받고, 완료 후 잔금 정산하는 방식이 일반적입니다. 업무별로 협의 가능합니다.', category: '비용' },
  { question: '진행 상황은 어떻게 확인하나요?', answer: '담당자가 진행 단계마다 전화 또는 이메일로 안내드립니다. 문의가 필요하시면 언제든 연락해 주세요.', category: '진행' }
];

async function loadFaqs() {
  const container = document.getElementById('faqFullList');
  try {
    const data = await API.get('faqs', { limit: 100, sort: 'sort_order' });
    allFaqs = (data.data && data.data.length > 0) ? data.data : FAQ_STATIC;
    renderFaqs(allFaqs);
  } catch(e) {
    // API 실패 시 정적 FAQ 표시
    allFaqs = FAQ_STATIC;
    renderFaqs(allFaqs);
  }
}

function renderFaqs(faqs) {
  const container = document.getElementById('faqFullList');
  if (!faqs.length) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:32px;">해당 카테고리의 FAQ가 없습니다.</p>';
    return;
  }
  container.innerHTML = faqs.map(f => `
    <div class="faq-item">
      <div class="faq-question">
        <span class="faq-q-text">${f.question}</span>
        <span class="faq-toggle"><i class="fas fa-chevron-down"></i></span>
      </div>
      <div class="faq-answer">${f.answer}</div>
    </div>
  `).join('');
  initFaq();
}

function filterFaq(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.faq-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (cat === '전체') {
    renderFaqs(allFaqs);
  } else {
    renderFaqs(allFaqs.filter(f => f.category === cat));
  }
}

document.addEventListener('DOMContentLoaded', loadFaqs);
</script>
