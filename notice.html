<script src="js/common.js"></script>
<script>
let allNotices = [];
let filteredNotices = [];
let currentPage = 1;
const pageSize = 8;
let currentTypeFilter = 'all';

async function loadNotices() {
  try {
    const data = await API.get('notices', { limit: 100 });
    allNotices = (data.data || []).sort((a,b) => (b.created_at||0) - (a.created_at||0));
    filteredNotices = [...allNotices];
    renderNotices();
  } catch(e) {
    document.getElementById('noticeList').innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-light);">공지사항을 불러올 수 없습니다.</p>';
  }
}

function filterNotice(type, btn) {
  currentTypeFilter = type;
  currentPage = 1;
  document.querySelectorAll('#tabAll,#tabNotice,#tabData').forEach(b => {
    b.className = b === btn ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
  });
  applyFilter();
}

function searchNotice(q) {
  currentPage = 1;
  applyFilter(q);
}

function applyFilter(searchQ) {
  const q = (searchQ || document.getElementById('searchInput').value).toLowerCase();
  filteredNotices = allNotices.filter(n => {
    const typeMatch = currentTypeFilter === 'all' || n.type === currentTypeFilter;
    const searchMatch = !q || n.title.toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q);
    return typeMatch && searchMatch;
  });
  renderNotices();
}

function renderNotices() {
  const list = document.getElementById('noticeList');
  const start = (currentPage - 1) * pageSize;
  const items = filteredNotices.slice(start, start + pageSize);

  if (!items.length) {
    list.innerHTML = '<p style="text-align:center;padding:48px;color:var(--text-light);">해당하는 게시글이 없습니다.</p>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = items.map((n, i) => `
    <div onclick="openNoticeDetail('${n.id}')" style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='var(--bg-light)'" onmouseout="this.style.background='white'">
      <span class="badge badge-${n.type}" style="flex-shrink:0;">${n.type}</span>
      <span style="flex:1;font-size:0.9rem;color:var(--text-dark);font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${n.title}${n.file_name ? ' <i class="fas fa-paperclip" style="color:var(--text-light);font-size:0.75rem;margin-left:4px;"></i>' : ''}</span>
      <span style="font-size:0.78rem;color:var(--text-light);white-space:nowrap;flex-shrink:0;">${n.post_date}</span>
      <span style="font-size:0.75rem;color:var(--text-light);flex-shrink:0;min-width:36px;text-align:right;">${n.views || 0}</span>
    </div>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const total = filteredNotices.length;
  const pages = Math.ceil(total / pageSize);
  const pager = document.getElementById('pagination');
  if (pages <= 1) { pager.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= pages; i++) {
    html += `<button onclick="goPage(${i})" style="width:34px;height:34px;border-radius:6px;border:1.5px solid ${i===currentPage?'var(--primary)':'var(--border)'};background:${i===currentPage?'var(--primary)':'white'};color:${i===currentPage?'white':'var(--text-dark)'};font-size:0.85rem;cursor:pointer;">${i}</button>`;
  }
  pager.innerHTML = html;
}

function goPage(p) { currentPage = p; renderNotices(); window.scrollTo({top:0,behavior:'smooth'}); }

async function openNoticeDetail(id) {
  try {
    const n = allNotices.find(x => x.id === id);
    if (!n) return;
    document.getElementById('modalTitle').textContent = n.title;
    document.getElementById('modalBadge').innerHTML = `<span class="badge badge-${n.type}">${n.type}</span>`;
    document.getElementById('modalMeta').textContent = `${n.post_date} | 조회 ${n.views || 0}`;
    document.getElementById('modalContent').innerHTML = n.content || '';
    document.getElementById('modalFile').innerHTML = n.file_name ? `<div style="display:flex;align-items:center;gap:8px;background:var(--bg-light);padding:10px 14px;border-radius:6px;font-size:0.83rem;"><i class="fas fa-paperclip" style="color:var(--primary);"></i><span>${n.file_name}</span></div>` : '';
    openModal('noticeModal');
    // 조회수 증가
    API.update('notices', id, { views: (n.views || 0) + 1 });
    n.views = (n.views || 0) + 1;
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', loadNotices);
</script>
